<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lifestyle & Wellness Intelligence System</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
    :root {
      --cyan: #00f3ff;
      --pink: #ff0055;
      --bg: #0a0a0f;
      --card: #111120;
      --border: #1e1e3a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: #e0e0f0;
      min-height: 100vh;
    }
    header {
      background: linear-gradient(135deg, #0d0d2b 0%, #12122a 100%);
      border-bottom: 1px solid var(--border);
      padding: 2rem;
      text-align: center;
    }
    header h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(90deg, var(--cyan), #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header p {
      color: #888;
      margin-top: 0.4rem;
      font-size: 0.95rem;
    }
    .container {
      max-width: 800px;
      margin: 2.5rem auto;
      padding: 0 1.5rem;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      margin-bottom: 1.5rem;
    }
    .card h2 {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--cyan);
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }
    label {
      display: block;
      font-size: 0.8rem;
      color: #aaa;
      font-weight: 500;
      margin-bottom: 0.4rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    input, select {
      width: 100%;
      background: #0d0d1e;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.6rem 0.9rem;
      color: #e0e0f0;
      font-size: 0.95rem;
      transition: border-color 0.2s;
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px rgba(0,243,255,0.08);
    }
    select option { background: #111120; }
    .btn {
      width: 100%;
      margin-top: 1.5rem;
      padding: 0.9rem;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, var(--cyan), #a855f7);
      color: #000;
      letter-spacing: 0.04em;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    footer {
      text-align: center;
      padding: 2rem;
      color: #444;
      font-size: 0.85rem;
    }
    @media(max-width:600px) {
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<header>
  <h1>🧠 Lifestyle & Wellness Intelligence</h1>
  <p>Enter your lifestyle data to get AI-powered health risk predictions and wellness insights</p>
</header>
<div class="container">
  <form method="POST" action="/">
    <div class="card">
      <h2>👤 Personal Information</h2>
      <div class="grid-3">
        <div>
          <label>Age</label>
          <input type="number" name="age" min="10" max="100" value="30" required />
        </div>
        <div>
          <label>Gender</label>
          <select name="gender">
            <option value="Male">Male</option>
            <option value="Female">Female</option>
          </select>
        </div>
        <div>
          <label>Height (cm)</label>
          <input type="number" name="height" min="100" max="250" value="170" required />
        </div>
      </div>
      <div class="grid-2" style="margin-top:1rem">
        <div>
          <label>Weight (kg)</label>
          <input type="number" name="weight" min="30" max="200" value="70" required />
        </div>
        <div>
          <label>Resting Heart Rate (bpm)</label>
          <input type="number" name="rest_hr" min="40" max="130" value="72" required />
        </div>
      </div>
    </div>

    <div class="card">
      <h2>🌙 Lifestyle Factors</h2>
      <div class="grid-2">
        <div>
          <label>Sleep Duration (hours/night)</label>
          <input type="number" name="sleep_duration" min="2" max="12" step="0.5" value="7" required />
        </div>
        <div>
          <label>Stress Level (1–10)</label>
          <input type="number" name="stress_level" min="1" max="10" value="4" required />
        </div>
      </div>
      <div class="grid-3" style="margin-top:1rem">
        <div>
          <label>Physical Activity (0–7 days/week)</label>
          <input type="number" name="physical_activity" min="0" max="7" value="3" required />
        </div>
        <div>
          <label>Smoking (0=No, 1=Yes)</label>
          <select name="smoking">
            <option value="0">No</option>
            <option value="1">Yes</option>
          </select>
        </div>
        <div>
          <label>Alcohol (drinks/week)</label>
          <input type="number" name="alcohol" min="0" max="20" value="1" required />
        </div>
      </div>
    </div>

    <button type="submit" class="btn">⚡ Predict My Wellness</button>
  </form>
</div>
<footer>Lifestyle &amp; Wellness Intelligence System &bull; Powered by ML</footer>
</body>
</html>
